services:
  postgres:
    image: postgres:16-alpine
    container_name: dozingo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dozingo_user
      POSTGRES_PASSWORD: dozingo_pass
      POSTGRES_DB: dozingo_db
    volumes:
      - dozingo-pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_web
    environment:
      PGADMIN_DEFAULT_EMAIL: user@example.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "4342:80"
    depends_on:
      - postgres

volumes:
  dozingo-pgdata:
